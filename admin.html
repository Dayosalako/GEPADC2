<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEPaDC | Control Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');
        .font-heading { font-family: 'Montserrat', sans-serif; }
        .transition-theme { transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease; }
        #gatekeeper { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-zinc-950 text-black dark:text-white transition-theme min-h-screen">

    <div id="gatekeeper" class="fixed inset-0 bg-black z-[999] flex items-center justify-center p-6">
        <div class="max-w-sm w-full bg-white p-10 shadow-2xl rounded-sm text-center">
            <h2 class="font-heading uppercase italic text-2xl mb-2 text-black">Security Access</h2>
            <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-8">Identify for Server Entry</p>
            <div class="space-y-6 text-left">
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-widest text-gray-400 mb-1">User Identity</label>
                    <input type="text" id="adminUser" placeholder="Enter Name" class="w-full border-b-2 border-gray-100 p-3 outline-none focus:border-black text-black font-bold uppercase text-sm bg-white">
                </div>
                <div>
                    <label class="block text-[9px] font-black uppercase tracking-widest text-gray-400 mb-1">Access Key</label>
                    <input type="password" id="adminPass" placeholder="••••••••" class="w-full border-b-2 border-gray-100 p-3 outline-none focus:border-[#2D5A27] text-black bg-white">
                </div>
                <button onclick="checkPass()" class="w-full bg-black text-white p-4 font-bold uppercase tracking-widest hover:bg-[#2D5A27] transition-all shadow-xl">Verify & Initialize</button>
            </div>
        </div>
    </div>

    <div id="adminContent" class="hidden">
        <header class="bg-white dark:bg-zinc-900 border-b border-gray-200 dark:border-zinc-800 sticky top-0 z-[100] transition-theme">
            <div class="max-w-7xl mx-auto px-6 lg:px-10 h-24 flex items-center justify-between">
                <div class="flex items-center gap-6">
                    <h1 class="font-heading font-black italic text-2xl uppercase tracking-tighter leading-none hidden md:block">
                        GEPaDC <span class="text-[#2D5A27]">Control.</span>
                    </h1>
                    <div class="h-8 w-[1px] bg-gray-200 dark:bg-zinc-800 hidden md:block"></div>
                    <div>
                        <p id="accessLevelLabel" class="text-[10px] font-black uppercase tracking-[0.3em] text-[#2D5A27] mb-1">Standard Access</p>
                        <h2 id="welcomeName" class="text-xs font-bold uppercase tracking-wider">Welcome, Administrator</h2>
                    </div>
                </div>

                <div class="flex items-center gap-6">
                    <button onclick="toggleDarkMode()" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-zinc-800 transition-colors">
                        <div id="modeIcon" class="text-gray-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.071 16.071l.707.707M7.757 7.757l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
                        </div>
                    </button>
                    <button onclick="logout()" class="relative group h-10 px-5 flex items-center justify-center border border-black dark:border-zinc-700 transition-all">
                        <div class="absolute inset-0 w-0 bg-red-600 transition-all duration-300 ease-out group-hover:w-full"></div>
                        <span class="relative text-[9px] font-black uppercase tracking-widest group-hover:text-white transition-colors">Logout</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-6 lg:px-10 py-16">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 mb-20">
                
                <section class="group bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 p-8 lg:p-12 shadow-sm hover:border-[#2D5A27] transition-theme relative overflow-hidden">
                    <span class="absolute -top-4 -right-4 text-9xl font-heading font-black opacity-[0.03] italic group-hover:opacity-[0.07] dark:text-white transition-opacity">01</span>
                    <div class="relative z-10">
                        <h2 class="text-[11px] font-black uppercase tracking-[0.4em] text-gray-400 mb-8">Gallery Media Engine</h2>
                        <form id="galleryForm" class="space-y-6">
                            <input type="file" id="imageInput" accept="image/*" required class="w-full text-[10px] font-bold uppercase border-2 border-dashed border-gray-100 dark:border-zinc-800 p-8 text-center cursor-pointer hover:bg-gray-50 dark:hover:bg-zinc-800 transition-all file:hidden">
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <input type="text" id="imageCaption" placeholder="Event Caption" required class="w-full border-b border-gray-200 dark:border-zinc-700 py-4 text-sm font-medium outline-none focus:border-[#2D5A27] bg-transparent">
                                
                                <select id="imageCategory" required class="w-full border-b border-gray-200 dark:border-zinc-700 py-4 text-sm font-bold uppercase outline-none focus:border-[#2D5A27] bg-transparent dark:text-white">
                                    <option value="" disabled selected>Select Category</option>
                                    <option value="protection" class="bg-white dark:bg-zinc-900">Protection</option>
                                    <option value="wash" class="bg-white dark:bg-zinc-900">WASH</option>
                                    <option value="peace" class="bg-white dark:bg-zinc-900">Peacebuilding</option>
                                    <option value="empowerment" class="bg-white dark:bg-zinc-900">Empowerment</option>
                                </select>
                            </div>

                            <button type="submit" id="galleryBtn" class="w-full bg-black dark:bg-white dark:text-black text-white py-5 font-black text-[10px] uppercase tracking-[0.3em] hover:bg-[#2D5A27] transition-all shadow-lg">Execute Upload</button>
                        </form>
                    </div>
                </section>

                <section class="group bg-white dark:bg-zinc-900 border border-gray-200 dark:border-zinc-800 p-8 lg:p-12 shadow-sm hover:border-[#2D5A27] transition-theme relative overflow-hidden">
                    <span class="absolute -top-4 -right-4 text-9xl font-heading font-black opacity-[0.03] italic group-hover:opacity-[0.07] dark:text-white transition-opacity">02</span>
                    <div class="relative z-10">
                        <h2 class="text-[11px] font-black uppercase tracking-[0.4em] text-gray-400 mb-8">Opportunity Board</h2>
                        <form id="jobForm" class="space-y-6">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="text" id="jobTitle" placeholder="Role Title" required class="w-full border-b border-gray-200 dark:border-zinc-700 py-4 text-sm font-medium outline-none focus:border-[#2D5A27] bg-transparent">
                                <input type="text" id="jobLoc" placeholder="Location" class="w-full border-b border-gray-200 dark:border-zinc-700 py-4 text-sm font-medium outline-none focus:border-[#2D5A27] bg-transparent">
                            </div>
                            <textarea id="jobDesc" placeholder="Responsibilities..." required class="w-full border border-gray-100 dark:border-zinc-800 p-4 h-32 text-sm font-medium outline-none focus:border-[#2D5A27] bg-gray-50 dark:bg-zinc-800 transition-all"></textarea>
                            <button type="submit" id="jobBtn" class="w-full bg-black dark:bg-white dark:text-black text-white py-5 font-black text-[10px] uppercase tracking-[0.3em] hover:bg-[#2D5A27] transition-all shadow-lg">Broadcast Role</button>
                        </form>
                    </div>
                </section>
            </div>

            <section class="mb-20">
                <div class="flex justify-between items-end mb-12">
                    <div>
                        <h2 class="text-xs font-black uppercase tracking-[0.4em] text-gray-400">03. Content Manager</h2>
                        <p class="text-[9px] font-bold uppercase tracking-[0.2em] mt-2">Live Cloud Database Sync</p>
                    </div>
                    <button onclick="refreshManager()" class="text-[10px] font-black uppercase border-b-2 border-black dark:border-white pb-1 hover:text-[#2D5A27] transition-all">Manual Sync</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-16">
                    <div>
                        <h3 class="text-[9px] font-black uppercase tracking-widest text-gray-400 mb-6">Media Records</h3>
                        <div id="adminGalleryList" class="space-y-4"></div>
                    </div>
                    <div>
                        <h3 class="text-[9px] font-black uppercase tracking-widest text-gray-400 mb-6">Active Vacancies</h3>
                        <div id="adminJobList" class="space-y-4"></div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="max-w-7xl mx-auto px-6 lg:px-10 pb-20">
            <div class="bg-black dark:bg-zinc-900 text-white p-8 rounded-sm shadow-2xl relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                        <h2 class="text-[10px] font-black uppercase tracking-[0.4em] text-gray-500">Live Activity Terminal</h2>
                    </div>
                    <div id="systemLog" class="font-mono text-[10px] uppercase tracking-widest space-y-2 max-h-32 overflow-y-auto opacity-80">
                        <p class="text-green-500">>> Secure Session Initialized.</p>
                    </div>
                </div>
            </div>
        </footer>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0yukCY7Ayd_mxnYtiUFQMOHDLvc1r9MTnn1bmFe24x-4Qk8gCLEh0tbm5p80rQMcT/exec";
    
    const SUPER_ADMIN = { name: "Dayo", pass: "Salako2020" };
    const ADMIN_PASS = "1234"; 

    function addToLog(msg, isErr = false) {
        const log = document.getElementById('systemLog');
        if (!log) return;
        const p = document.createElement('p');
        p.className = isErr ? 'text-red-500' : 'text-green-500';
        p.innerHTML = `[${new Date().toLocaleTimeString()}] >> ${msg}`;
        log.prepend(p);
    }

    function checkPass() {
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;
        let authenticated = false;
        let role = "Admin";

        if (user.toLowerCase() === SUPER_ADMIN.name.toLowerCase() && pass === SUPER_ADMIN.pass) {
            authenticated = true;
            role = "Super Admin";
        } else if (pass === ADMIN_PASS) {
            authenticated = true;
            role = "Staff Admin";
        }

        if (authenticated) {
            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('userName', user || "Administrator");
            sessionStorage.setItem('userRole', role);
            initializePortal();
        } else {
            alert("ACCESS DENIED: Invalid Credentials.");
            addToLog("SECURITY ALERT: Failed Login Attempt.", true);
        }
    }

    function initializePortal() {
        const user = sessionStorage.getItem('userName');
        const role = sessionStorage.getItem('userRole');

        document.getElementById('gatekeeper').classList.add('hidden');
        document.getElementById('adminContent').classList.remove('hidden');
        document.getElementById('welcomeName').innerText = `Welcome, ${user}`;
        document.getElementById('accessLevelLabel').innerText = `${role} Level Access`;
        
        addToLog(`SESSION: Authenticated as ${role} (${user}).`);
        refreshManager();
        if (localStorage.getItem('theme') === 'dark') applyDarkMode(true);
    }

    function toggleDarkMode() {
        const isDark = !document.documentElement.classList.contains('dark');
        applyDarkMode(isDark);
    }

    function applyDarkMode(isDark) {
        const html = document.documentElement;
        const iconContainer = document.getElementById('modeIcon');
        if (isDark) {
            html.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            if(iconContainer) iconContainer.innerHTML = `<svg class="w-5 h-5 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>`;
        } else {
            html.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            if(iconContainer) iconContainer.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.071 16.071l.707.707M7.757 7.757l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>`;
        }
    }

    function logout() {
        if (confirm("Terminate Session?")) {
            sessionStorage.clear();
            window.location.reload();
        }
    }

    async function refreshManager() {
        const gList = document.getElementById('adminGalleryList');
        const jList = document.getElementById('adminJobList');
        gList.innerHTML = '<p class="text-[9px] uppercase animate-pulse">Syncing Gallery...</p>';
        jList.innerHTML = '<p class="text-[9px] uppercase animate-pulse">Syncing Jobs...</p>';

        try {
            const gRes = await fetch(SCRIPT_URL);
            const images = await gRes.json();
            // Added category label display in the management list
            gList.innerHTML = images.map(img => `
                <div class="flex items-center justify-between bg-white dark:bg-zinc-900 p-4 border border-black/5 dark:border-white/5 group">
                    <div class="flex items-center gap-4">
                        <img src="${img[1]}" class="w-10 h-10 object-cover grayscale group-hover:grayscale-0 transition shadow-sm" onerror="this.src='https://via.placeholder.com/40?text=IMG'">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-bold uppercase truncate w-32 dark:text-gray-400 leading-tight">${img[2] || 'UNTITLED'}</span>
                            <span class="text-[7px] font-black uppercase tracking-widest text-[#2D5A27] mt-1">${img[4] || 'General'}</span>
                        </div>
                    </div>
                    <button onclick="deleteAction('Gallery', '${img[3]}')" class="text-red-600 font-black text-[9px] uppercase hover:underline">Delete</button>
                </div>
            `).join('') || '<p class="text-[10px] uppercase text-gray-400">No media found.</p>';

            const jRes = await fetch(SCRIPT_URL + "?type=jobs");
            const jobs = await jRes.json();
            jList.innerHTML = jobs.map(job => `
                <div class="flex items-center justify-between bg-white dark:bg-zinc-900 p-4 border border-black/5 dark:border-white/5">
                    <span class="text-[9px] font-bold uppercase truncate mr-4 dark:text-gray-400">${job[1]}</span>
                    <button onclick="deleteAction('Jobs', '${job[4]}')" class="text-red-600 font-black text-[9px] uppercase hover:underline">Close</button>
                </div>
            `).join('') || '<p class="text-[10px] uppercase text-gray-400">No jobs active.</p>';
            addToLog("SYNC: Cloud mirroring successful.");
        } catch (e) { addToLog("SYNC ERROR: Connection failed.", true); }
    }

    document.getElementById('galleryForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('galleryBtn');
        const file = document.getElementById('imageInput').files[0];
        const category = document.getElementById('imageCategory').value;
        const caption = document.getElementById('imageCaption').value;

        btn.innerText = "UPLOADING..."; btn.disabled = true;
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            try {
                await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({
                    type: "GALLERY", 
                    image: reader.result.split(',')[1], 
                    mimeType: file.type, 
                    name: file.name, 
                    caption: caption,
                    category: category
                })});
                addToLog(`SUCCESS: Asset "${file.name}" uploaded to ${category}.`);
                e.target.reset(); refreshManager();
            } catch (err) { addToLog("CRITICAL: Upload failed.", true); }
            finally { btn.innerText = "EXECUTE UPLOAD"; btn.disabled = false; }
        };
    };

    document.getElementById('jobForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('jobBtn');
        btn.innerText = "BROADCASTING..."; btn.disabled = true;
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({
                type: "JOB", title: document.getElementById('jobTitle').value, description: document.getElementById('jobDesc').value, location: document.getElementById('jobLoc').value
            })});
            addToLog(`SUCCESS: New job opportunity broadcast.`);
            e.target.reset(); refreshManager();
        } catch (err) { addToLog("POST FAILED: Check connection.", true); }
        finally { btn.innerText = "BROADCAST ROLE"; btn.disabled = false; }
    };

    async function deleteAction(sheet, id) {
        if (!confirm(`Permanently purge this from ${sheet}?`)) return;
        try {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: "DELETE_ITEM", targetSheet: sheet, itemId: id })});
            addToLog(`PURGE: Record ID ${id} removed from ${sheet}.`);
            refreshManager();
        } catch (e) { addToLog("DELETE FAILED.", true); }
    }

    window.onload = () => {
        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            initializePortal();
        }
    };
</script>                                        
</body>
</html>
